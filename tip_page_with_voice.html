<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorHub — 投げ銭ページ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefec;
  --text: #1a1a1a; --text2: #6b6b6b; --text3: #9b9b9b;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
  --radius-md: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1c; --bg2: #252525; --bg3: #2e2e2e;
    --text: #f0f0f0; --text2: #aaaaaa; --text3: #717171;
    --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg3); min-height: 100vh;
  display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem;
}
.phone {
  width: 340px; background: var(--bg);
  border-radius: 24px; border: 0.5px solid var(--border2);
  overflow: hidden; box-shadow: 0 2px 24px rgba(0,0,0,0.08);
}
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 18px 4px; font-size: 11px; color: var(--text3);
}
.page { padding: 0 18px 32px; }
.back-row {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 0 14px; cursor: pointer;
}
.back-arrow { font-size: 16px; color: var(--text2); }
.back-label { font-size: 13px; color: var(--text2); }
.creator-mini {
  display: flex; align-items: center; gap: 10px;
  padding: 12px; background: var(--bg2);
  border-radius: var(--radius-md); margin-bottom: 18px;
}
.mini-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  border: 0.5px solid var(--border); background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500; color: var(--text); flex-shrink: 0;
}
.mini-name { font-size: 14px; font-weight: 500; color: var(--text); }
.mini-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.sec-label {
  font-size: 10px; font-weight: 500; color: var(--text3);
  letter-spacing: 0.06em; text-transform: uppercase; margin: 0 0 8px;
}
.amount-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 16px; }
.amt-btn {
  padding: 10px 4px; border: 0.5px solid var(--border);
  border-radius: var(--radius-md); background: var(--bg);
  font-size: 13px; font-weight: 500; cursor: pointer;
  text-align: center; color: var(--text); transition: all 0.12s;
}
.amt-btn.sel { background: var(--text); color: var(--bg); border-color: var(--text); }
.custom-wrap {
  display: flex; align-items: center;
  border: 0.5px solid var(--border); border-radius: var(--radius-md);
  overflow: hidden; margin-bottom: 18px;
}
.yen-sign {
  padding: 0 10px; font-size: 14px; color: var(--text2);
  background: var(--bg2); border-right: 0.5px solid var(--border);
  height: 38px; display: flex; align-items: center;
}
.custom-input {
  flex: 1; border: none; background: transparent;
  padding: 0 10px; font-size: 14px; color: var(--text);
  font-family: inherit; height: 38px; outline: none;
}
.msg-tabs {
  display: flex; gap: 4px; background: var(--bg2);
  border-radius: var(--radius-md); padding: 3px; margin-bottom: 10px;
}
.msg-tab {
  flex: 1; padding: 7px 4px; border: none; background: transparent;
  border-radius: 6px; font-size: 12px; font-weight: 500;
  color: var(--text2); cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.msg-tab.active { background: var(--bg); color: var(--text); border: 0.5px solid var(--border); }
.msg-textarea {
  width: 100%; border: 0.5px solid var(--border);
  border-radius: var(--radius-md); padding: 10px 12px;
  font-size: 13px; color: var(--text); font-family: inherit;
  background: var(--bg); resize: none; min-height: 76px;
  outline: none; line-height: 1.6;
}
.msg-textarea:focus { border-color: var(--border2); }
.char-row { display: flex; justify-content: flex-end; margin: 4px 0 14px; }
.char-count { font-size: 11px; color: var(--text3); }
.voice-box {
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md); padding: 16px 14px; margin-bottom: 14px;
}
.voice-idle { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.mic-btn {
  width: 60px; height: 60px; border-radius: 50%;
  border: 0.5px solid var(--border); background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; color: var(--text);
}
.mic-btn:hover { background: var(--bg); border-color: var(--border2); }
.mic-btn.recording { background: var(--text); border-color: var(--text); color: var(--bg); }
.waveform { display: flex; align-items: center; justify-content: center; gap: 3px; height: 32px; margin: 4px 0; }
.wave-bar { width: 3px; border-radius: 2px; background: var(--text); transition: height 0.15s; }
.rec-timer { font-size: 22px; font-weight: 500; color: var(--text); letter-spacing: 0.04em; }
.voice-hint { font-size: 12px; color: var(--text2); }
.voice-hint.rec { color: var(--text); font-weight: 500; }
.stop-btn {
  padding: 8px 20px; border: 0.5px solid var(--border);
  border-radius: var(--radius-md); background: transparent;
  color: var(--text); font-size: 12px; cursor: pointer;
}
.voice-preview { display: none; flex-direction: column; gap: 10px; }
.audio-row { display: flex; align-items: center; gap: 10px; }
.play-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 0.5px solid var(--border); background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; color: var(--text);
}
.play-btn:hover { background: var(--bg); }
.progress-track { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; cursor: pointer; }
.progress-fill { height: 100%; background: var(--text); width: 0%; border-radius: 2px; }
.audio-time { font-size: 11px; color: var(--text2); min-width: 36px; text-align: right; }
.retake-btn {
  font-size: 12px; color: var(--text2); background: transparent;
  border: none; cursor: pointer; text-decoration: underline;
  text-underline-offset: 2px; align-self: flex-start;
}
.voice-note { font-size: 11px; color: var(--text3); line-height: 1.5; }
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px; border: 0.5px solid var(--border);
  border-radius: var(--radius-md); margin-bottom: 18px; cursor: pointer;
}
.toggle-label { font-size: 13px; color: var(--text); }
.toggle-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.toggle-track {
  width: 36px; height: 20px; border-radius: 10px;
  background: var(--border); cursor: pointer; position: relative;
  transition: background 0.2s; flex-shrink: 0;
}
.toggle-track.on { background: var(--text); }
.toggle-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--bg); position: absolute;
  top: 2px; left: 2px; transition: left 0.2s;
}
.toggle-track.on .toggle-thumb { left: 18px; }
.divider { border: none; border-top: 0.5px solid var(--border); margin: 0 0 16px; }
.summary-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
.summary-label { font-size: 12px; color: var(--text2); }
.summary-val { font-size: 12px; color: var(--text); }
.summary-total { font-size: 15px; font-weight: 500; color: var(--text); }
.btn-primary {
  display: block; width: 100%; padding: 13px;
  background: var(--text); color: var(--bg);
  border: none; border-radius: var(--radius-md);
  font-size: 14px; font-weight: 500; cursor: pointer;
  text-align: center; margin-top: 14px; transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.8; }
.btn-secondary {
  display: block; width: 100%; padding: 11px;
  background: transparent; color: var(--text);
  border: 0.5px solid var(--border2); border-radius: var(--radius-md);
  font-size: 13px; cursor: pointer; text-align: center;
}
.secure-note {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; margin-top: 10px; font-size: 11px; color: var(--text3);
}
.success-screen {
  display: none; flex-direction: column; align-items: center;
  padding: 40px 18px 32px; text-align: center;
}
.success-circle {
  width: 60px; height: 60px; border-radius: 50%;
  border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin-bottom: 16px;
}
.success-title { font-size: 17px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
.success-sub { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 24px; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>creatorhub.jp</span></div>

  <div class="page" id="form-page">
    <div class="back-row" onclick="goBack()">
      <span class="back-arrow">‹</span>
      <span class="back-label">Yuki のページに戻る</span>
    </div>
    <div class="creator-mini">
      <div class="mini-avatar">YI</div>
      <div><div class="mini-name">Yuki Illustration</div><div class="mini-sub">に応援を送る</div></div>
    </div>

    <div class="sec-label">金額を選ぶ</div>
    <div class="amount-grid">
      <button class="amt-btn" onclick="pickAmt(this,300)">¥300</button>
      <button class="amt-btn sel" onclick="pickAmt(this,500)">¥500</button>
      <button class="amt-btn" onclick="pickAmt(this,1000)">¥1,000</button>
      <button class="amt-btn" onclick="pickAmt(this,3000)">¥3,000</button>
    </div>
    <div class="custom-wrap">
      <span class="yen-sign">¥</span>
      <input class="custom-input" type="number" id="custom-amt" placeholder="金額を入力" oninput="onCustom(this)">
    </div>

    <div class="sec-label">メッセージ</div>
    <div class="msg-tabs">
      <button class="msg-tab active" id="tab-text" onclick="switchTab('text')">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="2" rx="1" fill="currentColor"/><rect x="2" y="7" width="9" height="2" rx="1" fill="currentColor"/><rect x="2" y="11" width="6" height="2" rx="1" fill="currentColor"/></svg>
        テキスト
      </button>
      <button class="msg-tab" id="tab-voice" onclick="switchTab('voice')">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="5" y="1" width="6" height="8" rx="3" fill="currentColor"/><path d="M2.5 8a5.5 5.5 0 0010 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/><line x1="8" y1="13.5" x2="8" y2="15.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        音声
      </button>
    </div>

    <div id="text-panel">
      <textarea class="msg-textarea" id="msg" placeholder="作品の感想や応援の言葉を添えられます..." oninput="onMsg()"></textarea>
      <div class="char-row"><span class="char-count"><span id="ccount">0</span> / 200</span></div>
    </div>

    <div id="voice-panel" style="display:none;">
      <div class="voice-box">
        <div class="voice-idle" id="v-idle">
          <div class="waveform" id="waveform">
            <div class="wave-bar" style="height:8px;opacity:0.2;"></div>
            <div class="wave-bar" style="height:14px;opacity:0.2;"></div>
            <div class="wave-bar" style="height:20px;opacity:0.2;"></div>
            <div class="wave-bar" style="height:28px;opacity:0.2;"></div>
            <div class="wave-bar" style="height:20px;opacity:0.2;"></div>
            <div class="wave-bar" style="height:14px;opacity:0.2;"></div>
            <div class="wave-bar" style="height:8px;opacity:0.2;"></div>
          </div>
          <button class="mic-btn" id="mic-btn" onclick="toggleRec()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <rect x="8" y="2" width="8" height="12" rx="4" fill="currentColor"/>
              <path d="M4 12a8 8 0 0016 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
              <line x1="12" y1="20" x2="12" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="rec-timer" id="rec-timer" style="display:none;">0:00</div>
          <div class="voice-hint" id="v-hint">タップして録音開始</div>
          <button class="stop-btn" id="stop-btn" style="display:none;" onclick="stopRec()">録音を止める</button>
        </div>
        <div class="voice-preview" id="v-preview">
          <div class="audio-row">
            <button class="play-btn" id="play-btn" onclick="togglePlay()">
              <svg id="play-icon" width="12" height="14" viewBox="0 0 12 14" fill="currentColor"><path d="M0 0l12 7-12 7V0z"/></svg>
            </button>
            <div class="progress-track" onclick="seekAudio(event)">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="audio-time" id="audio-time">0:00</span>
          </div>
          <button class="retake-btn" onclick="retake()">録り直す</button>
          <div class="voice-note">クリエイターのみ再生できます。最大30秒</div>
        </div>
      </div>
    </div>

    <div class="toggle-row" onclick="toggleAnon()">
      <div>
        <div class="toggle-label">匿名で送る</div>
        <div class="toggle-sub">名前がクリエイターに表示されません</div>
      </div>
      <div class="toggle-track" id="anon-toggle"><div class="toggle-thumb"></div></div>
    </div>

    <hr class="divider">
    <div class="summary-row">
      <span class="summary-label">応援金額</span>
      <span class="summary-val" id="s-amt">¥500</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">手数料（10%）</span>
      <span class="summary-val" id="s-fee">¥50</span>
    </div>
    <div class="summary-row" style="border-top:0.5px solid var(--border);padding-top:8px;margin-top:4px;">
      <span class="summary-label" style="font-weight:500;color:var(--text);">お支払い合計</span>
      <span class="summary-total" id="s-total">¥550</span>
    </div>
    <button class="btn-primary" id="pay-btn" onclick="pay()">¥550 を送る</button>
    <div class="secure-note">
      <svg width="10" height="12" viewBox="0 0 10 12" fill="none"><rect x="1" y="5" width="8" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M3 5V3.5a2 2 0 014 0V5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Stripe による安全な決済
    </div>
  </div>

  <div class="success-screen" id="success-page">
    <div class="success-circle">☕</div>
    <div class="success-title">応援を送りました！</div>
    <div class="success-sub" id="success-sub">Yuki Illustration さんに<br>¥500 の応援が届きました。<br>ありがとうございます。</div>
    <button class="btn-primary" style="margin-bottom:10px;" onclick="goBack()">プロフィールに戻る</button>
    <button class="btn-secondary">シェアする</button>
  </div>
</div>

<script>
let selAmt = 500, anonOn = false;
let isRec = false, recSec = 0, recInterval = null, waveInterval = null;
let playInterval = null, playSec = 0, totalSec = 0, isPlaying = false;

function switchTab(tab) {
  document.getElementById('tab-text').classList.toggle('active', tab === 'text');
  document.getElementById('tab-voice').classList.toggle('active', tab === 'voice');
  document.getElementById('text-panel').style.display = tab === 'text' ? 'block' : 'none';
  document.getElementById('voice-panel').style.display = tab === 'voice' ? 'block' : 'none';
}
function pickAmt(el, v) {
  document.querySelectorAll('.amt-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel'); selAmt = v;
  document.getElementById('custom-amt').value = ''; updateSummary();
}
function onCustom(el) {
  document.querySelectorAll('.amt-btn').forEach(b => b.classList.remove('sel'));
  selAmt = parseInt(el.value) || 0; updateSummary();
}
function updateSummary() {
  const fee = Math.round(selAmt * 0.1), total = selAmt + fee;
  document.getElementById('s-amt').textContent = '¥' + selAmt.toLocaleString();
  document.getElementById('s-fee').textContent = '¥' + fee.toLocaleString();
  document.getElementById('s-total').textContent = '¥' + total.toLocaleString();
  document.getElementById('pay-btn').textContent = selAmt > 0 ? '¥' + total.toLocaleString() + ' を送る' : '金額を選んでください';
}
function onMsg() {
  document.getElementById('ccount').textContent = Math.min(document.getElementById('msg').value.length, 200);
}
function toggleAnon() {
  anonOn = !anonOn;
  document.getElementById('anon-toggle').classList.toggle('on', anonOn);
}
function pay() {
  document.getElementById('form-page').style.display = 'none';
  const sp = document.getElementById('success-page'); sp.style.display = 'flex';
  document.getElementById('success-sub').innerHTML = 'Yuki Illustration さんに<br>¥' + selAmt.toLocaleString() + ' の応援が届きました。<br>ありがとうございます。';
}
function goBack() {
  document.getElementById('form-page').style.display = 'block';
  document.getElementById('success-page').style.display = 'none';
  retake();
}
function toggleRec() {
  if (isRec) return; isRec = true; recSec = 0;
  const btn = document.getElementById('mic-btn');
  btn.classList.add('recording');
  btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24"><rect x="7" y="7" width="10" height="10" rx="2" fill="currentColor"/></svg>';
  btn.onclick = stopRec;
  document.getElementById('v-hint').textContent = '録音中...';
  document.getElementById('v-hint').classList.add('rec');
  document.getElementById('rec-timer').style.display = 'block';
  document.getElementById('stop-btn').style.display = 'block';
  animateWave();
  recInterval = setInterval(() => {
    recSec++;
    document.getElementById('rec-timer').textContent = fmt(recSec);
    if (recSec >= 30) stopRec();
  }, 1000);
}
function stopRec() {
  if (!isRec) return; isRec = false;
  clearInterval(recInterval); clearInterval(waveInterval); totalSec = recSec;
  document.getElementById('v-idle').style.display = 'none';
  const prev = document.getElementById('v-preview'); prev.style.display = 'flex';
  document.getElementById('audio-time').textContent = fmt(totalSec);
  resetWave();
}
function retake() {
  clearInterval(playInterval); clearInterval(waveInterval);
  isRec = false; isPlaying = false; playSec = 0;
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('v-preview').style.display = 'none';
  document.getElementById('v-idle').style.display = 'flex';
  const btn = document.getElementById('mic-btn'); btn.classList.remove('recording');
  btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="8" y="2" width="8" height="12" rx="4" fill="currentColor"/><path d="M4 12a8 8 0 0016 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/><line x1="12" y1="20" x2="12" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
  btn.onclick = toggleRec;
  document.getElementById('v-hint').textContent = 'タップして録音開始';
  document.getElementById('v-hint').classList.remove('rec');
  document.getElementById('rec-timer').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'none';
  recSec = 0; resetWave();
}
function togglePlay() {
  if (!isPlaying) {
    isPlaying = true;
    document.getElementById('play-icon').innerHTML = '<rect x="0" y="0" width="4" height="14" rx="1" fill="currentColor"/><rect x="7" y="0" width="4" height="14" rx="1" fill="currentColor"/>';
    playInterval = setInterval(() => {
      playSec += 0.2;
      if (playSec >= totalSec) {
        playSec = totalSec; clearInterval(playInterval); isPlaying = false;
        document.getElementById('play-icon').innerHTML = '<path d="M0 0l12 7-12 7V0z"/>';
      }
      document.getElementById('progress-fill').style.width = Math.round((playSec / totalSec) * 100) + '%';
      document.getElementById('audio-time').textContent = fmt(Math.round(playSec)) + ' / ' + fmt(totalSec);
    }, 200);
  } else {
    isPlaying = false; clearInterval(playInterval);
    document.getElementById('play-icon').innerHTML = '<path d="M0 0l12 7-12 7V0z"/>';
  }
}
function seekAudio(e) {
  const pct = e.offsetX / e.currentTarget.offsetWidth; playSec = pct * totalSec;
  document.getElementById('progress-fill').style.width = Math.round(pct * 100) + '%';
  document.getElementById('audio-time').textContent = fmt(Math.round(playSec)) + ' / ' + fmt(totalSec);
}
function animateWave() {
  const bars = document.querySelectorAll('.wave-bar'), h = [8,14,22,30,22,14,8];
  waveInterval = setInterval(() => {
    bars.forEach((b, i) => {
      b.style.height = Math.max(4, h[i] + Math.round((Math.random() - .5) * h[i] * .9)) + 'px';
      b.style.opacity = '1';
    });
  }, 120);
}
function resetWave() {
  document.querySelectorAll('.wave-bar').forEach((b, i) => {
    b.style.height = [8,14,20,28,20,14,8][i] + 'px'; b.style.opacity = '0.2';
  });
}
function fmt(s) { return Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + (s % 60); }
</script>
</body>
</html>
